# Local development stack (backend + database).
# The Next.js frontend runs separately with `npm run dev` (see frontend/README
# usage in PANDUAN_DEPLOY.md). In production the frontend lives on Vercel and
# this backend lives on Railway.

services:
  db:
    image: postgres:16-alpine
    container_name: proprec-db
    environment:
      POSTGRES_DB: proprec
      POSTGRES_USER: proprec
      POSTGRES_PASSWORD: proprec123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    container_name: proprec-api
    environment:
      # Local Postgres. The app auto-normalizes the scheme to psycopg2.
      DATABASE_URL: postgresql+psycopg2://proprec:proprec123@db:5432/proprec
      CORS_ORIGINS: "*"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
